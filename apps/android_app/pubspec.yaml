name: android_app
description: "Local offline text-to-speech Android application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cross_file: ^0.3.4+2
  http: ^1.3.0
  just_audio: ^0.10.4
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  share_plus: ^11.1.0
  tts_core:
    path: ../../packages/tts_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/approved_models.json
